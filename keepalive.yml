name: Supabase Keep-Alive

# 無料プロジェクトは「1週間APIリクエストが無い」と一時停止される。
# 毎日1回 ping() を叩いてアクティブな状態を保つ。
on:
  schedule:
    - cron: "30 0 * * *"   # 毎日 00:30 UTC（日本時間 9:30）に実行
  workflow_dispatch: {}     # 手動実行ボタンも有効化

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase RPC
        run: |
          echo "Pinging $SUPABASE_URL ..."
          code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "$SUPABASE_URL/rest/v1/rpc/ping" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP $code"
          cat /tmp/resp.txt
          # 2xx 以外は失敗扱いにして通知が来るようにする
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "Keep-alive failed"; exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
